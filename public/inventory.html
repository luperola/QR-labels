<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Inventory</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        max-width: 760px;
      }
      input,
      select,
      button,
      textarea {
        font-size: 16px;
        padding: 8px;
        margin: 4px 0;
        width: 100%;
        box-sizing: border-box;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 12px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 6px;
        font-size: 14px;
      }
      .ok {
        color: #0a7a2f;
      }
      .err {
        color: #b00020;
      }
      .scannerModal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 16px;
        z-index: 1000;
      }
      .scannerVideo {
        width: min(480px, 100%);
        border-radius: 8px;
        background: #000;
      }
      .scannerActions {
        width: min(480px, 100%);
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .scannerActions button {
        margin: 0;
      }
      .info {
        color: #0a5ea8;
      }
    </style>
  </head>
  <body>
    <h1>Movimenti magazzino (test)</h1>
    <p>
      Lo stock è salvato sul PC/server nel file
      <code>data/movements.json</code>, non sul telefono.
    </p>

    <label>Payload QR (es: <code>sku=ABC;lot=L1</code>)</label>
    <input id="payload" placeholder="sku=ABC;lot=L1" />
    <button id="parseBtn">Leggi QR</button>

    <div class="row">
      <div>
        <label>SKU</label>
        <input id="sku" />
      </div>
      <div>
        <label>LOT</label>
        <input id="lot" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Tipo</label>
        <select id="type">
          <option value="IN">IN (entrata)</option>
          <option value="OUT">OUT (uscita)</option>
        </select>
      </div>
      <div>
        <label>Quantità</label>
        <input id="qty" type="number" min="1" value="1" />
      </div>
    </div>

    <label>Operatore</label>
    <input id="operator" placeholder="es. Luca" />
    <label>Note</label>
    <textarea id="note" rows="2"></textarea>

    <button id="saveBtn">Salva movimento</button>
    <p id="msg"></p>

    <h2>Stock attuale</h2>
    <table id="stockTable">
      <thead>
        <tr>
          <th>SKU</th>
          <th>LOT</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      const $ = (id) => document.getElementById(id);

      async function refreshStock() {
        const res = await fetch("/api/stock");
        const data = await res.json();
        const tbody = $("stockTable").querySelector("tbody");
        tbody.innerHTML = "";
        data.stock.forEach((s) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${s.sku}</td><td>${s.lot || "-"}</td><td>${s.stock}</td>`;
          tbody.appendChild(tr);
        });
      }

      async function parsePayload(payload) {
        const res = await fetch(
          `/api/scan?payload=${encodeURIComponent(payload)}`,
        );
        const data = await res.json();
        $("sku").value = data.sku || "";
        $("lot").value = data.lot || "";
      }

      function setMessage(text, className = "") {
        $("msg").className = className;
        $("msg").textContent = text;
      }

      async function scanWithCamera() {
        const isLocalhost =
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1";

        if (!window.isSecureContext && !isLocalhost) {
          throw new Error(
            "Fotocamera non disponibile: apri questa pagina in HTTPS (oppure da localhost) e riprova.",
          );
        }

        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error(
            "Fotocamera non disponibile su questo browser/dispositivo. Inserisci il payload QR manualmente.",
          );
        }

        if (!window.BarcodeDetector) {
          throw new Error(
            "Scansione camera non supportata su questo browser. Incolla il payload e premi 'Leggi QR'.",
          );
        }

        const detector = new BarcodeDetector({ formats: ["qr_code"] });
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
        });

        return new Promise((resolve, reject) => {
          const modal = document.createElement("div");
          modal.className = "scannerModal";
          modal.innerHTML = `
            <video class="scannerVideo" autoplay playsinline muted></video>
            <div class="scannerActions">
              <button type="button" id="cancelScanBtn">Annulla</button>
            </div>
          `;

          const video = modal.querySelector("video");
          const cancelButton = modal.querySelector("#cancelScanBtn");
          video.srcObject = stream;

          let active = true;

          const cleanup = () => {
            active = false;
            stream.getTracks().forEach((track) => track.stop());
            modal.remove();
          };

          cancelButton.addEventListener("click", () => {
            cleanup();
            reject(new Error("Scansione annullata"));
          });

          document.body.appendChild(modal);

          const tick = async () => {
            if (!active) return;

            try {
              const codes = await detector.detect(video);
              if (codes.length) {
                cleanup();
                resolve(codes[0].rawValue || "");
                return;
              }
            } catch {
              // Ignora frame non leggibili; riprova al frame successivo.
            }

            requestAnimationFrame(tick);
          };

          video.addEventListener(
            "loadeddata",
            () => {
              requestAnimationFrame(tick);
            },
            { once: true },
          );
        });
      }

      $("parseBtn").onclick = async () => {
        try {
          let payload = $("payload").value.trim();

          if (!payload) {
            setMessage("Apro la fotocamera per leggere il QR...", "info");
            payload = await scanWithCamera();
            $("payload").value = payload;
          }

          await parsePayload(payload);
          setMessage("QR letto correttamente.", "ok");
        } catch (error) {
          setMessage(
            error.message || "Errore durante la lettura del QR.",
            "err",
          );
        }
      };

      $("saveBtn").onclick = async () => {
        const body = {
          sku: $("sku").value,
          lot: $("lot").value,
          type: $("type").value,
          qty: Number($("qty").value),
          operator: $("operator").value,
          note: $("note").value,
        };

        const res = await fetch("/api/movement", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        setMessage(
          res.ok
            ? `Movimento salvato. Stock attuale: ${data.stock}`
            : data.error,
          res.ok ? "ok" : "err",
        );
        if (res.ok) refreshStock();
      };

      refreshStock();
    </script>
  </body>
</html>
