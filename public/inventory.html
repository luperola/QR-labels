<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Inventory</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 16px;
        line-height: 1.4;
      }
      input,
      select,
      button,
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
        padding: 10px;
        margin: 4px 0 10px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .hint {
        font-size: 13px;
        color: #555;
      }
      .ok {
        color: #0a7a2f;
      }
      .err {
        color: #b00020;
      }
      .info {
        color: #0a5ea8;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 6px;
        font-size: 14px;
      }
      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Movimenti magazzino</h1>
    <p class="hint">
      iPhone + HTTP: usa <b>Leggi QR da foto</b>, scatta/seleziona foto, poi
      salva.
    </p>

    <label for="payload">Payload QR (es: sku=ABC;lot=L1)</label>
    <input id="payload" placeholder="sku=ABC;lot=L1" autocomplete="off" />
    <button id="scanBtn" type="button">Leggi QR da foto</button>
    <button id="parseBtn" type="button">Usa payload scritto a mano</button>

    <div class="row">
      <div>
        <label for="sku">SKU</label><input id="sku" autocomplete="off" />
      </div>
      <div>
        <label for="lot">LOT</label><input id="lot" autocomplete="off" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="type">Tipo</label>
        <select id="type">
          <option value="IN">IN</option>
          <option value="OUT">OUT</option>
        </select>
      </div>
      <div>
        <label for="qty">Quantità</label
        ><input id="qty" type="number" min="1" value="1" />
      </div>
    </div>

    <label for="operator">Operatore</label
    ><input id="operator" autocomplete="off" /> <label for="note">Note</label
    ><textarea id="note" rows="2"></textarea>
    <button id="saveBtn" type="button">Salva movimento</button>
    <p id="msg" aria-live="polite"></p>

    <h2>Stock attuale</h2>
    <table id="stockTable">
      <thead>
        <tr>
          <th>SKU</th>
          <th>LOT</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <input
      id="qrImageInput"
      type="file"
      accept="image/*"
      capture="environment"
      hidden
    />

    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      const setMessage = (t, c = "") => {
        $("msg").className = c;
        $("msg").textContent = t;
      };

      async function refreshStock() {
        try {
          const res = await fetch("/api/stock");
          const data = await res.json();
          const tbody = $("stockTable").querySelector("tbody");
          tbody.innerHTML = "";
          (data.stock || []).forEach((r) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${r.sku}</td><td>${r.lot || "-"}</td><td>${r.stock}</td>`;
            tbody.appendChild(tr);
          });
        } catch {
          setMessage("Errore caricamento stock.", "err");
        }
      }

      async function parsePayload(payload) {
        const res = await fetch(
          `/api/scan?payload=${encodeURIComponent(payload)}`,
        );
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Payload non valido.");
        $("sku").value = data.sku || "";
        $("lot").value = data.lot || "";
      }

      function pickImage() {
        return new Promise((resolve, reject) => {
          const i = $("qrImageInput");
          i.value = "";
          i.onchange = () =>
            i.files && i.files[0]
              ? resolve(i.files[0])
              : reject(new Error("Nessuna foto selezionata."));
          i.click();
        });
      }

      async function decodeFromImage(file) {
        if (!window.ZXing?.BrowserQRCodeReader)
          throw new Error("Libreria QR non caricata.");
        const url = URL.createObjectURL(file);
        try {
          const out = await new ZXing.BrowserQRCodeReader().decodeFromImageUrl(
            url,
          );
          if (!out?.text) throw new Error("QR non trovato.");
          return out.text.trim();
        } catch {
          throw new Error(
            "QR non letto. Riprova con foto più nitida e ravvicinata.",
          );
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      $("scanBtn").addEventListener("click", async () => {
        try {
          setMessage("Apro fotocamera/album...", "info");
          const payload = await decodeFromImage(await pickImage());
          $("payload").value = payload;
          await parsePayload(payload);
          setMessage("QR letto correttamente.", "ok");
        } catch (e) {
          setMessage(e.message || "Errore lettura QR.", "err");
        }
      });

      $("parseBtn").addEventListener("click", async () => {
        try {
          const payload = $("payload").value.trim();
          if (!payload) throw new Error("Inserisci prima il payload.");
          await parsePayload(payload);
          setMessage("Payload interpretato.", "ok");
        } catch (e) {
          setMessage(e.message || "Errore payload.", "err");
        }
      });

      $("saveBtn").addEventListener("click", async () => {
        try {
          const body = {
            sku: $("sku").value.trim(),
            lot: $("lot").value.trim(),
            type: $("type").value,
            qty: Number($("qty").value),
            operator: $("operator").value.trim(),
            note: $("note").value.trim(),
          };
          const res = await fetch("/api/movement", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok)
            throw new Error(data.error || "Salvataggio non riuscito.");
          setMessage(`Movimento salvato. Stock attuale: ${data.stock}`, "ok");
          refreshStock();
        } catch (e) {
          setMessage(e.message || "Errore salvataggio.", "err");
        }
      });

      refreshStock();
    </script>
  </body>
</html>
